<!DOCTYPE html>
<html>

<head>
    <title>Devai  Technologies</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/form.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>Contact Us</h2>
            <p class="form-subtitle">Fill out the form below and we will be in touch</p>
            <div class="form-group">
                <input id="name" placeholder="Name">
            </div>
            <div class="form-group">
                <input id="phone" placeholder="Phone">
            </div>
            <div class="form-group">
                <input id="service" placeholder="Service">
            </div>
            <button id="submitBtn" onclick="submitLead()">Submit</button>
            <p id="submitMessage" class="submit-message" aria-live="polite"></p>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/form.js"></script>

</body>

</html>
