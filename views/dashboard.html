<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devai Automation Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard-shell">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-logo">DA</span>
                <span class="brand-text">Devai Automation</span>
            </div>
            <nav class="nav-list" id="sidebarNav">
                <button class="nav-item active" data-module="dashboard">Dashboard</button>
                <button class="nav-item" data-module="customers">Customers</button>
                <button class="nav-item" data-module="conversations">Conversations</button>
                <button class="nav-item" data-module="services">Services</button>
                <button class="nav-item" data-module="offers">Offers</button>
                <button class="nav-item" data-module="appointments">Appointments</button>
                <button class="nav-item" data-module="leads">Leads</button>
                <button class="nav-item" data-module="posts">Posts</button>
                <button class="nav-item" data-module="knowledge-base">Auto Reply Setup</button>
                <button class="nav-item" data-module="channels">Channels</button>
                <button class="nav-item" data-module="settings">Settings</button>
            </nav>
        </aside>


        <div class="main-panel">
            <header class="topbar">
                <div>
                    <h1 id="businessTitle">Devai Automation</h1>
                    <p id="topbarSubtitle">Multi-tenant automation dashboard</p>
                </div>
                <div class="profile-actions">
                    <span class="profile-chip" id="userName">User</span>
                    <button class="btn btn-danger" id="logoutBtn" type="button">Logout</button>
                </div>
            </header>

            <main id="moduleRoot" class="module-root"></main>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
</body>

</html>
