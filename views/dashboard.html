<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

    <div class="dashboard-header">
        <div class="left">
            🏢 <span id="businessTitle"></span>
        </div>

        <div class="right">
            👤 <span id="userName"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">

        <div class="analytics">
            <div class="card">
                <h3>Total Leads</h3>
                <span id="totalLeads">0</span>
            </div>
            <div class="card">
                <h3>Leads Today</h3>
                <span id="todayLeads">0</span>
            </div>
            <div class="card">
                <h3>Converted Leads</h3>
                <span id="convertedLeads">0</span>
            </div>
        </div>

        <div class="card" style="max-width: 100%; margin: 30px auto;">
            <h3>Your Lead Form Link</h3>
            <p id="leadLink"></p>
            <div class="link-actions">
                <button onclick="generateLeadLink()">Generate Form Link</button>
                <button onclick="copyLeadLink()">Copy Link</button>
            </div>
            <div class="card">
                <h3>Lead Form QR Code</h3>
                <button onclick="generateQR()">Generate QR Code</button>
                <button onclick="downloadQR()">Download QR Code</button>
                <div id="qrcode"></div>
                <button onclick="exportLeads()">
                    Export Leads
                </button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Service</th>
                            <th>Status</th>
                            <th>Note</th>
                        </tr>
                    </thead>
                    <tbody id="table"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/qrcode.min.js"></script>
    <script src="/js/html2canvas.min.js"></script>
</body>

</html>
