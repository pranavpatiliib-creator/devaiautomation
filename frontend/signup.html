<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 460px;
            padding: 24px 16px;
        }

        .card {
            background: #fff;
            padding: 40px 36px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
            width: 100%;
        }

        .app-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        h2 {
            text-align: center;
            color: #007bff;
            font-size: 17px;
            margin-bottom: 22px;
        }

        input,
        select {
            display: block;
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            background: #fafafa;
            appearance: none;
        }

        input::placeholder {
            color: #adb5bd;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.10);
        }

        button {
            display: block;
            width: 100%;
            padding: 13px;
            margin-top: 6px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        p {
            text-align: center;
            font-size: 13.5px;
            color: #6b7280;
            margin-top: 18px;
        }

        a {
            color: #007bff;
            font-weight: 600;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            body {
                display: block !important;
                background: #fff !important;
            }

            .container {
                padding: 0 !important;
                max-width: 100% !important;
            }

            .card {
                padding: 48px 20px 40px !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                min-height: 100vh !important;
                width: 100% !important;
            }

            input,
            select,
            button {
                font-size: 16px !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1 class="app-title">Devai Automation</h1>
            <h2>Create Account For Your Business</h2>

            <input id="name" placeholder="Name">
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <input id="businessName" placeholder="Business Name">
            <select id="profession">
                <option value="Gym">Gym</option>
                <option value="Salon">Salon</option>
                <option value="Clinic">Clinic</option>
                <option value="Real Estate">Real Estate</option>
            </select>
            <input id="businessPhone" placeholder="Business Phone">
            <input id="location" placeholder="City">
            <input id="services" placeholder="Main Service">
            <input id="website" placeholder="Website">

            <button id="signupBtn" onclick="signup()">
                Sign Up
                <span id="spinner" style="display:none;">⏳</span>
            </button>

            <p>Already registered? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
