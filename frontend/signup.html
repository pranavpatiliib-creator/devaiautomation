<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>



    <div class="container">
        <div class="card">
            <h1 class="app-title">Devai Automation</h1>
            <h2 style="text-align: center;">Create Account</h2>
            <input id="name" placeholder="Name">

            <input id="email" placeholder="Email">

            <input id="password" type="password" placeholder="Password">

            <input id="businessName" placeholder="Business Name">

            <select id="profession">
                <option value="Gym">Gym</option>
                <option value="Salon">Salon</option>
                <option value="Clinic">Clinic</option>
                <option value="Real Estate">Real Estate</option>
            </select>

            <input id="businessPhone" placeholder="Business Phone">

            <input id="location" placeholder="City">

            <input id="services" placeholder="Main Service">

            <input id="website" placeholder="Website">

            <br><br>

            <div style="text-align: center;">
                <button onclick="signup()">Signup</button>
            </div>

            <br><br>

            Already registered?
            <a href="login.html">Login here</a>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
