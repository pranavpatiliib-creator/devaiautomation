<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1 class="app-title">Devai Automation</h1>

    <div class="container">
        <div class="card">

            <h2>Create Account</h2>
            <p class="form-subtitle">Sign up for Devai Automation</p>

            <div class="form-group">
                <input id="name" placeholder="Name">
            </div>

            <div class="form-group">
                <input id="email" placeholder="Email">
            </div>

            <div class="form-group">
                <input id="password" type="password" placeholder="Password">
            </div>

            <div class="form-group">
                <input id="businessName" placeholder="Business Name">
            </div>

            <div class="form-group">
                <select id="profession">
                    <option value="">Select Your Industry</option>
                    <option value="Gym">Gym</option>
                    <option value="Salon">Salon</option>
                    <option value="Clinic">Clinic</option>
                    <option value="Real Estate">Real Estate</option>
                </select>
            </div>

            <div class="form-group">
                <input id="businessPhone" placeholder="Business Phone">
            </div>

            <div class="form-group">
                <input id="location" placeholder="City">
            </div>

            <div class="form-group">
                <input id="services" placeholder="Main Service">
            </div>

            <div class="form-group">
                <input id="website" placeholder="Website">
            </div>

            <button onclick="signup()">Signup</button>

            <div class="auth-link">
                Already registered?
                <a href="login.html">Login here</a>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
