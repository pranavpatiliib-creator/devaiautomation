<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
        }
        .container {
            width: 100%;
            max-width: 440px;
            padding: 24px 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            padding: 44px 36px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            width: 100%;
        }
        .app-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        h2 {
            text-align: center;
            color: #007bff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            font-size: 13.5px;
            color: #6b7280;
            margin-bottom: 24px;
        }
        input {
            display: block;
            width: 100%;
            padding: 13px 14px;
            margin-bottom: 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            background: #fafafa;
            appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input::placeholder { color: #adb5bd; }
        input:focus {
            outline: none;
            border-color: #007bff;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.10);
        }
        button {
            display: block;
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(0,123,255,0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,123,255,0.35);
        }
        #message {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        #message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        #message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        #resetLinkBox {
            background: #f0f4f8;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 14px;
            margin-top: 14px;
            font-size: 13px;
            color: #007bff;
            word-break: break-all;
            display: none;
        }
        p {
            text-align: center;
            font-size: 13.5px;
            color: #6b7280;
            margin-top: 18px;
        }
        a { color: #007bff; font-weight: 600; text-decoration: none; }
        a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            body { display: block; background: #fff; }
            .container { padding: 0; max-width: 100%; display: block; }
            .card {
                padding: 60px 24px 40px;
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
                min-height: 100dvh;
            }
            input, button { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="app-title">Devai Automation</h1>
            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your email and we'll send you a reset link</p>

            <input id="email" type="email" placeholder="Enter your email">
            <button onclick="forgotPassword()">Send Reset Link</button>

            <div id="message"></div>
            <div id="resetLinkBox"></div>

            <p>Remember your password? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script>
        async function forgotPassword() {
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message');
            const resetLinkBox = document.getElementById('resetLinkBox');

            if (!email) {
                message.className = 'error';
                message.textContent = 'Please enter your email.';
                return;
            }

            try {
                const res = await fetch('http://localhost:5000/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (res.ok) {
                    message.className = 'success';
                    message.textContent = 'Reset link generated! Click the link below.';
                    // Show reset link (remove in production - send via email instead)
                    resetLinkBox.style.display = 'block';
                    resetLinkBox.innerHTML = `<a href="${data.resetLink}">Click here to reset password</a>`;
                } else {
                    message.className = 'error';
                    message.textContent = data.message || 'Something went wrong.';
                }
            } catch (err) {
                message.className = 'error';
                message.textContent = 'Could not connect to server.';
            }
        }
    </script>
</body>
</html>
