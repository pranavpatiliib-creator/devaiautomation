<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f4f8;
            color: #1a1a1a;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 24px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            padding: 44px 36px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
            width: 100%;
        }

        .app-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        h2 {
            text-align: center;
            color: #007bff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        input {
            display: block;
            width: 100%;
            padding: 13px 14px;
            margin-bottom: 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            color: #1a1a1a;
            background: #fafafa;
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder {
            color: #adb5bd;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.10);
        }

        button {
            display: block;
            width: 100%;
            padding: 13px;
            margin-top: 4px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(0, 123, 255, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 123, 255, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        p {
            text-align: center;
            font-size: 13.5px;
            color: #6b7280;
            margin-top: 18px;
        }

        a {
            color: #007bff;
            font-weight: 600;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Mobile: full screen */
        @media (max-width: 768px) {
            body {
                display: block;
                background: #ffffff;
            }

            .container {
                padding: 0;
                max-width: 100%;
                min-height: 100vh;
                display: block;
            }

            .card {
                padding: 60px 24px 40px;
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
                min-height: 100dvh;
                width: 100%;
            }

            input,
            button {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1 class="app-title">Devai Automation</h1>
            <h2>Login</h2>

            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">

            <button onclick="login()">Login</button>

            <p>Don't have an account? <a href="signup.html">Signup here</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
