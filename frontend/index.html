<!DOCTYPE html>
<html>

<head>
    <title>LeadFlow AI</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>Contact Us</h2>
            <p class="form-subtitle">Fill out the form below and we'll be in touch</p>
            <div class="form-group">
                <input id="name" placeholder="Name">
            </div>
            <div class="form-group">
                <input id="phone" placeholder="Phone">
            </div>
            <div class="form-group">
                <input id="service" placeholder="Service">
            </div>
            <button onclick="submitLead()">Submit</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
